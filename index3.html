<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EISF Document</title>
  </head>
  <body>
    <h2>Employee Interest Survey Form</h2>
    <form action="">
      <label for="enter your name">Enter Your Name: </label>
      <input type="text" id="enteryourname" />
      <br />
      <br />
      <label for="enter your department">Enter Your Department: </label>
      <input type="text" id="enteryourdepartment" />
      <br />
      <br />
      <label for="tell us a little about yourself"
        >Tell us a little about yourself:
      </label>
      <textarea
        name="introduction"
        id="tell us a little about yourself"
      ></textarea>
      <br />
      <br />
      <label for="do you exercise at home">Do you exercise at home? </label>
      <label for="yes">Yes</label>
      <input type="radio" name="yes" id="" />
      <label for="no">No</label>
      <input type="radio" name="no" id="" />
      <br />
      <br />
      <label for="resources"
        >How do you like to read about your favourite topic?</label>
      <br />
      <input type="checkbox" name="resources" id="books" />
      <label for="books">Books</label>
      <input type="checkbox" name="resources" id="books" />
      <label for="books">Online Resources</label>
      <input type="checkbox" name="resources" id="books" />
      <label for="books">Phone Apps</label>
      <input type="checkbox" name="resources" id="books" />
      <label for="books">Magazines</label>
      <br />
      <br />
      <label for="movies">What genre of movie do you like? </label>
      <br />
      <input type="submit" name="" id="" value="Submit form" />
    </form>
  </body>
</html>
