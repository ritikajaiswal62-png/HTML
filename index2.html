<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <h1>Registration Form</h1>
  <body>
    <form action="">
      <br />
      <br />
      <br>
      <label for="lastname">Lastname: </label>
      <input type="text" name="lastname" id="lastname" placeholder="eg.Doe" />
      <br />
      <br />
      <label for="gender">Gender: </label>
      <label for="male">Male</label>
      <input type="radio" name="gender" id="male" checked />
      <label for="female">Female</label>
      <input type="radio" name="gender" id="female" />
      <br />
      <br />
      <label for="date_of_birth">Date of Birth: </label>
      <input type="date" name="" id="date_of_birth" />
      <br />
      <br />
      <label for="address">Address: </label>
      <input
        type="text"
        name="address"
        id="address"
        placeholder="your address"
      />
      <br />
      <br />
      <label for="city">City</label>
      <select name="city" id="city">
        <option value="kolkata">Kolkata</option>
        <option value="mumbai">Mumbai</option>
        <option value="chennai">Chennai</option>
        <option value="pune">Pune</option>
      </select>
      <br />
      <br />
      <label for="pin">Pin: </label>
      <input type="number" name="pin" id="pin" placeholder="eg.123456" />
      <br />
      <br />
      <br />
      <input type="checked" name="" id="" />
      <label for="check"
        >I hereby declare that the above mentioned statements are true as per my
        knowlwedge.</label
      >
      <br />
      <input type="submit" name="" id="" value="sign up" />
      <input type="reset" name="" id="" value="reset" />
    </form>
  </body>
</html>
